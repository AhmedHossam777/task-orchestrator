name: CI

on:
  push:
    branches:
      - main
      - master
jobs:
  first-job:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: run CI script
        run: ./scripts/ci.sh
